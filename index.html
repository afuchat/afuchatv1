  <meta property="og:title" content="AfuChat">
  <meta name="twitter:title" content="AfuChat">
  <meta property="og:description" content="AfuChat — The all-in-one social app where you can post like X, chat like Telegram, shop, and use built-in AI. Fast, private, and data-friendly.">
  <meta name="twitter:description" content="AfuChat — The all-in-one social app where you can post like X, chat like Telegram, shop, and use built-in AI. Fast, private, and data-friendly.">
</head>

  <body>
    <!-- Inline script to prevent theme flash -->
    <script>
      (function() {
        // Detect Telegram Mini App first
        var isTelegram = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData;
        
        // Theme handling - use Telegram theme if in Telegram
        var theme, resolved;
        if (isTelegram && window.Telegram.WebApp.colorScheme) {
          resolved = window.Telegram.WebApp.colorScheme;
          document.documentElement.classList.add('telegram-mini-app');
        } else {
          theme = localStorage.getItem('afuchat-theme') || 'system';
          if (theme === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } else if (theme === 'light' || theme === 'dark') {
            resolved = theme;
          } else {
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
        }
        document.documentElement.classList.add(resolved);
        
        // Update theme-color meta tag
        var themeColor = resolved === 'dark' ? '#0F1114' : '#F6F6F6';
        var meta = document.querySelector('meta[name="theme-color"]:not([media])');
        if (meta) meta.setAttribute('content', themeColor);

        // Handle iOS safe areas
        if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
          document.documentElement.classList.add('ios-device');
        }

        // Handle Android
        if (/Android/.test(navigator.userAgent)) {
          document.documentElement.classList.add('android-device');
        }
        
        // Set Telegram viewport height CSS variable early
        if (isTelegram) {
          document.documentElement.style.setProperty('--tg-viewport-height', window.Telegram.WebApp.viewportHeight + 'px');
          document.documentElement.style.setProperty('--tg-viewport-stable-height', window.Telegram.WebApp.viewportStableHeight + 'px');
        }
      })();
    </script>
    
    <!-- App loading indicator for slow connections -->
    <style>
      #app-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--loader-bg, #0F1114);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      html.light #app-loader { --loader-bg: #F6F6F6; }
      html.dark #app-loader { --loader-bg: #0F1114; }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid transparent;
        border-top-color: #00C2CB;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    
    <div id="app-loader">
      <div class="spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Hide loader when app is ready -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('app-loader');
          if (loader) loader.classList.add('hidden');
        }, 100);
      });
    </script>
  </body>
